<!DOCTYPE html>
<html>

<head>
    <title>Fake News & Deepfake Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>AI Fake News & Deepfake Detector</h1>

        <div class="tabs">
            <button onclick="showTab('text')">Text News</button>
            <button onclick="showTab('image')">Image</button>
            <button onclick="showTab('video')">Video</button>
        </div>

        <!-- TEXT TAB -->
        <div id="text-tab" class="tab-content">
            <form id="text-form">
                <textarea id="user_input" placeholder="Enter news text here..." required></textarea>
                <button type="submit">Analyze News</button>
            </form>
            <div id="text-result" class="result-box"></div>
        </div>

        <!-- IMAGE TAB -->
        <div id="image-tab" class="tab-content hidden">
            <form id="image-form" enctype="multipart/form-data">
                <input type="file" id="image_file" accept="image/*" required>
                <button type="submit">Analyze Image</button>
            </form>
            <div id="image-result" class="result-box"></div>
        </div>

        <!-- VIDEO TAB -->
        <div id="video-tab" class="tab-content hidden">
            <form id="video-form" enctype="multipart/form-data">
                <input type="file" id="video_file" accept="video/*" required>
                <button type="submit">Analyze Video</button>
            </form>
            <div id="video-result" class="result-box"></div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
